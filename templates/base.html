<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    =====================================================================
    PAGE TITLE
    =====================================================================
    Each child page can override this title using a Jinja block.
    If it doesn't, the fallback "RateFoodPerth" is used.

    Child page usage:
      {% block title %}Restaurant Name — RateFoodPerth{% endblock %}
    =====================================================================
  -->
  <title>{% block title %}RateFoodPerth{% endblock %}</title>


    <!--
    =====================================================================
    BOOTSTRAP CSS
    =====================================================================
-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!--
    =====================================================================
    OUR CUSTOM CSS
    =====================================================================
    Path: /static/style.css for now. Phase 3 will swap this to
    {{ url_for('static', filename='style.css') }} once Flask serves the app.
  -->
  <link rel="stylesheet" href="/static/style.css">

</head>

<body>

  <!--
    =====================================================================
    NAVBAR
    =====================================================================
    Bootstrap navbar classes explained:
      navbar             — marks this as a Bootstrap navbar
      navbar-expand-lg   — full navbar on large screens, hamburger on mobile
      sticky-top         — stays visible when you scroll down
    =====================================================================
  -->
  <nav class="navbar navbar-expand-lg sticky-top" id="main-navbar">
    <div class="container">

      <!-- ── LOGO ───────────────────────────────────────────────────── -->
      <a class="navbar-brand" href="/">
        <span class="logo-text">RateFoodPerth</span><span class="logo-dot">.</span>
      </a>

      <!--
        HAMBURGER BUTTON
        Only visible on mobile
      -->
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarContent"
              aria-controls="navbarContent"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- ── NAV LINKS (collapses into hamburger on mobile) ─────────── -->
      <div class="collapse navbar-collapse" id="navbarContent">

        <!-- Left side: main navigation -->
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/"><i class="bi bi-house"></i> Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/search"><i class="bi bi-search"></i> Discover</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/leaderboard"><i class="bi bi-trophy"></i> Leaderboard</a>
          </li>
        </ul>

        <!--
          Right side: will change depending on login state.

          For now we show the logged-OUT state as a static placeholder.
        -->
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-2">

          <!-- LOGGED OUT: show these two buttons -->
          <li class="nav-item">
            <a class="nav-link" href="/login">Log in</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-primary btn-sm px-3" href="/register">Sign up</a>
          </li>

        </ul>
      </div><!-- end #navbarContent -->
    </div><!-- end .container -->
  </nav>


  <!--
    =====================================================================
    MAIN CONTENT BLOCK
    =====================================================================
    This is the slot that each child page fills with its own content.

    A child page uses it like this:

      {% extends "base.html" %}

      {% block content %}
        <div class="container">
          <h1>My Page</h1>
          <p>My content goes here.</p>
        </div>
      {% endblock %}

    Everything outside this block (navbar, footer, etc.) is inherited
    automatically — you never have to repeat it.
    =====================================================================
  -->
  <main>
    {% block content %}{% endblock %}
  </main>


  <!--
    =====================================================================
    FOOTER
    =====================================================================
  -->
  <footer class="site-footer">
    <div class="container py-4">
      <div class="row align-items-center">

        <!-- Left: branding -->
        <div class="col-md-4 mb-3 mb-md-0">
          <div>
            <span class="logo-text footer-logo">RateFoodPerth</span><span class="logo-dot">.</span>
          </div>
          <p class="footer-tagline mb-0">Perth's honest food review community.</p>
        </div>

        <!-- Centre: nav links -->
        <div class="col-md-4 mb-3 mb-md-0 text-md-center">
          <ul class="list-inline mb-0 footer-links">
            <li class="list-inline-item"><a href="/">Home</a></li>
            <li class="list-inline-item"><a href="/search">Discover</a></li>
            <li class="list-inline-item"><a href="/leaderboard">Leaderboard</a></li>
            <li class="list-inline-item"><a href="/register">Sign up</a></li>
          </ul>
        </div>

        <!-- Right: copyright -->
        <div class="col-md-4 text-md-end">
          <p class="footer-tagline mb-0">&copy; 2026 RateFoodPerth. CITS3403 Project.</p>
        </div>

      </div>
    </div>
  </footer>


  <!--
    =====================================================================
    BOOTSTRAP JAVASCRIPT
    =====================================================================
  -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!--
    =====================================================================
    EXTRA SCRIPTS BLOCK
    =====================================================================
    Child pages that need their own JavaScript can inject it here.
    =====================================================================
  -->
  {% block scripts %}{% endblock %}

</body>
</html>
