<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Restaurant</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="restaurant-page">

<div class="container py-5" style="max-width: 700px;">
  <div class="restaurant-card">

    <h1 class="mb-4 text-center">Add a Restaurant</h1>

    <form id="restaurantForm">

      <!-- Restaurant Name -->
      <div class="mb-3">
        <label class="form-label">Restaurant Name</label>
        <input type="text" id="restaurantName" class="form-control" placeholder="Enter restaurant name">
        <div class="text-danger small" id="nameError"></div>
    </div>

      <!-- Suburb -->
      <div class="mb-3">
        <label class="form-label">Suburb</label>
        <select id="suburb" class="form-select">
          <option value="">Select a suburb</option>
          <option>Perth CBD</option>
          <option>Subiaco</option>
          <option>Fremantle</option>
          <option>Victoria Park</option>
          <option>Northbridge</option>
        </select>
        <div class="text-danger small" id="nameError"></div>
      </div>

      <!-- Cuisine Tags -->
      <div class="mb-3">
        <label class="form-label">Cuisine Tags</label>
        <div id="cuisineTags" class="d-flex flex-wrap gap-2">

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="italian">
            <label class="form-check-label" for="italian">Italian</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="japanese">
            <label class="form-check-label" for="japanese">Japanese</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="thai">
            <label class="form-check-label" for="thai">Thai</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="indian">
            <label class="form-check-label" for="indian">Indian</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="mexican">
            <label class="form-check-label" for="mexican">Mexican</label>
          </div>
        </div>
        <div class="text-danger small" id="cuisineError"></div>
      </div>

      <!-- Price Range -->
      <div class="mb-3">
        <label class="form-label">Price Range</label>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="price" id="price1">
          <label class="form-check-label" for="price1">$</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="price" id="price2">
          <label class="form-check-label" for="price2">$$</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="price" id="price3">
          <label class="form-check-label" for="price3">$$$</label>
        </div>
      </div>

      <button class="btn btn-primary w-100">Add Restaurant</button>

    </form>

  </div>
</div>

</body>
</html>
