<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Write a Review</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="container py-5" style="max-width: 700px;">
  <h1 class="mb-4">Write a Review</h1>
  <form>

    <div class="mb-3">
      <label class="form-label">Restaurant</label>
      <select class="form-select">
        <option value="">Select a restaurant</option>
        <option>Spice Hub</option>
        <option>Sweet Tooth Cafe</option>
        <option>Urban Bites</option>
        <option>Healthy Greens</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Rating</label>
      <div class="fs-3">
        <i class="bi bi-star"></i>
        <i class="bi bi-star"></i>
        <i class="bi bi-star"></i>
        <i class="bi bi-star"></i>
        <i class="bi bi-star"></i>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Review</label>
      <textarea class="form-control" rows="4"></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Craving Tags</label>
      <div class="d-flex flex-wrap gap-2">
        <span class="badge bg-light text-dark border">Spicy</span>
        <span class="badge bg-light text-dark border">Sweet</span>
        <span class="badge bg-light text-dark border">Cheap</span>
        <span class="badge bg-light text-dark border">Hearty</span>
        <span class="badge bg-light text-dark border">Healthy</span>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Price Paid ($)</label>
      <input type="number" class="form-control" min="0">
    </div>

    <button class="btn btn-primary w-100">Submit Review</button>

  </form>

</div>

</body>
</html>
