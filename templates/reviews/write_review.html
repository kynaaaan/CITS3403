<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Write a Review</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="container py-5" style="max-width: 700px;">
  <h1 class="mb-4">Write a Review</h1>
  <form>

    <div class="mb-3">
      <label class="form-label">Restaurant</label>
      <select class="form-select">
        <option value="">Select a restaurant</option>
        <option>Spice Hub</option>
        <option>Sweet Tooth Cafe</option>
        <option>Urban Bites</option>
        <option>Healthy Greens</option>
      </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Rating</label>
        <div id="stars" class="fs-3">
            <i class="bi bi-star" data-value="1"></i>
            <i class="bi bi-star" data-value="2"></i>
            <i class="bi bi-star" data-value="3"></i>
            <i class="bi bi-star" data-value="4"></i>
            <i class="bi bi-star" data-value="5"></i>
        </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Review</label>
      <textarea class="form-control" rows="4"></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Craving Tags</label>
        <div id="tags" class="d-flex flex-wrap gap-2">
            <button type="button" class="btn btn-outline-dark tag">Spicy</button>
            <button type="button" class="btn btn-outline-dark tag">Sweet</button>
            <button type="button" class="btn btn-outline-dark tag">Cheap</button>
            <button type="button" class="btn btn-outline-dark tag">Hearty</button>
            <button type="button" class="btn btn-outline-dark tag">Healthy</button>
        </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Price Paid ($)</label>
      <input type="number" class="form-control" min="0">
    </div>

    <button class="btn btn-primary w-100">Submit Review</button>

  </form>

</div>
<script>
var selectedRating = 0;

var stars = document.querySelectorAll("#stars i");

stars.forEach(function(star) {
  star.addEventListener("click", function() {
    selectedRating = star.getAttribute("data-value");
    updateStars();
  });
});

function updateStars() {
  stars.forEach(function(star) {
    if (star.getAttribute("data-value") <= selectedRating) {
      star.classList.remove("bi-star");
      star.classList.add("bi-star-fill", "text-warning");
    } else {
      star.classList.add("bi-star");
      star.classList.remove("bi-star-fill", "text-warning");
    }
  });
}
</script>
<script>
var tags = document.querySelectorAll(".tag");

tags.forEach(function(tag) {
  tag.addEventListener("click", function() {

    // Toggle visual state
    if (tag.classList.contains("btn-outline-dark")) {
      tag.classList.remove("btn-outline-dark");
      tag.classList.add("btn-dark");
    } else {
      tag.classList.remove("btn-dark");
      tag.classList.add("btn-outline-dark");
    }

  });
});
</script>

</body>
</html>
